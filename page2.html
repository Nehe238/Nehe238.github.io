<style>
  :root {
    --blue:#2563EB; --blue-light:#DBEAFE; --blue-dark:#1E40AF;
    --green:#10B981; --green-light:#D1FAE5;
    --orange:#F59E0B; --orange-light:#FEF3C7;
    --red:#EF4444; --red-light:#FEE2E2;
    --purple:#7C3AED; --purple-light:#EDE9FE;
    --bg:#F8FAFC; --surface:#FFFFFF;
    --border:#E2E8F0; --text:#0F172A; --text-2:#475569; --text-3:#94A3B8;
    --nav-h:64px; --radius:12px;
    --shadow:0 1px 3px rgba(0,0,0,.08),0 4px 16px rgba(0,0,0,.06);
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);line-height:1.7;-webkit-font-smoothing:antialiased}

  /* NAV */
  nav{position:fixed;top:0;left:0;right:0;z-index:100;height:var(--nav-h);background:rgba(255,255,255,.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 2rem;gap:0}
  .nav-brand{font-size:.75rem;font-weight:700;letter-spacing:.08em;color:var(--orange);text-transform:uppercase;margin-right:2rem;white-space:nowrap;font-family:'DM Mono',monospace}
  .tabs{display:flex;gap:0;flex:1;overflow-x:auto}
  .tab-btn{padding:.5rem 1.1rem;font-size:.875rem;font-weight:500;color:var(--text-2);background:none;border:none;cursor:pointer;border-radius:8px;transition:all .2s;white-space:nowrap;font-family:'Noto Sans KR',sans-serif;position:relative}
  .tab-btn::after{content:'';position:absolute;bottom:-1px;left:1.1rem;right:1.1rem;height:2px;background:var(--orange);transform:scaleX(0);transition:transform .2s;border-radius:2px}
  .tab-btn:hover{color:var(--orange);background:var(--orange-light)}
  .tab-btn.active{color:var(--orange);font-weight:600}
  .tab-btn.active::after{transform:scaleX(1)}

  /* 우측 상단 홈 링크 스타일 */
  .nav-home-link {
    display:inline-flex;
    align-items:center;
    padding:.45rem .9rem;
    font-size:.85rem;
    font-weight:500;
    color:var(--text-2);
    text-decoration:none;
    border:1px solid var(--border);
    border-radius:6px;
    transition:all .2s;
    white-space:nowrap;
    margin-left:1rem;
  }
  .nav-home-link:hover {
    color:var(--orange);
    background:var(--orange-light);
    border-color:var(--orange);
  }

  /* MAIN */
  main{padding-top:var(--nav-h)}
  .tab-panel{display:none}
  .tab-panel.active{display:block}

  .hero{background:linear-gradient(135deg,#0F172A 0%,#1E3A5F 50%,#1D4ED8
